---
# =============================================================================
# playbook_main.yml
# Description : Covers 6 selected elements across System Administration,
#               System Hardening, and AD DS GPO Hardening.
# Targets     : [rocky] hosts for Linux tasks, [windows] hosts for GPO tasks
# Usage       : ansible-playbook playbook_main.yml --check   # dry-run first
#               ansible-playbook playbook_main.yml           # apply
# =============================================================================


# =============================================================================
# PLAY 1 — System Administration
# Element 1: Deploy a custom MOTD banner to all Linux hosts
# Element 2: Configure /etc/resolv.conf to point DNS at AD01
# Targets   : all Linux hosts (rocky group — Ansible01, Ansible02)
#             also targets Controller if you add it to [linux] group;
#             adjust the hosts line to match your inventory as needed.
# =============================================================================
- name: "PLAY 1 | System Administration — MOTD Banner and DNS Resolver"
  hosts: rocky
  become: true   # escalate to root for file writes

  vars:
    # --- Element 1 vars ---
    motd_banner: |
      ############################################################
      #  Authorized access only. All activity is monitored.      #
      #  Unauthorized access is prohibited and will be reported. #
      ############################################################

    # --- Element 2 vars ---
    # Point all Rocky hosts at AD01 for DNS resolution.
    # AD01 holds the only forward and reverse lookup zones.
    dns_server_ip: "192.168.1.10"   # <-- replace with your AD01 IP
    dns_domain:    "lab.local"      # <-- replace with your domain name

  tasks:

    # ------------------------------------------------------------------
    # Element 1 — Custom MOTD banner
    # Writes the banner text to /etc/motd so it displays at every login.
    # ------------------------------------------------------------------
    - name: "E1 | Deploy custom MOTD banner to /etc/motd"
      copy:
        dest:    /etc/motd
        content: "{{ motd_banner }}"
        owner:   root
        group:   root
        mode:    '0644'
      # Logical step: copy module is idempotent — reruns are safe.
      # If the file already matches, no change is reported.

    - name: "E1 | Verify MOTD content was written"
      command: cat /etc/motd
      register: motd_output
      changed_when: false   # read-only command, never marks changed

    - name: "E1 | Debug — show MOTD contents"
      debug:
        msg: "{{ motd_output.stdout_lines }}"

    # ------------------------------------------------------------------
    # Element 2 — Configure /etc/resolv.conf to use AD01 for DNS
    # Writes a managed resolv.conf so Rocky hosts resolve domain names
    # through the AD01 DNS server (which holds all A and PTR records).
    # ------------------------------------------------------------------
    - name: "E2 | Write /etc/resolv.conf pointing at AD01"
      copy:
        dest:    /etc/resolv.conf
        owner:   root
        group:   root
        mode:    '0644'
        content: |
          # Managed by Ansible — do not edit manually
          search {{ dns_domain }}
          nameserver {{ dns_server_ip }}
      # Conditional note: if NetworkManager is managing resolv.conf on
      # your Rocky hosts it may overwrite this file on reboot.
      # For a permanent fix you would set dns=none in NetworkManager.conf,
      # but that is intentionally out of scope for this element.

    - name: "E2 | Verify DNS resolution reaches AD01 (nslookup)"
      command: "nslookup {{ dns_domain }} {{ dns_server_ip }}"
      register: dns_check
      changed_when: false
      ignore_errors: true   # error handling: don't abort if DNS is slow

    - name: "E2 | Debug — DNS check output"
      debug:
        msg: "{{ dns_check.stdout_lines }}"


# =============================================================================
# PLAY 2 — System Hardening
# Element 3: SSH hardening on Rocky hosts
#             (disable root login, enforce Protocol 2, set safe ciphers)
# Element 4: Correct file permissions on /etc/shadow and /etc/passwd
# Targets   : rocky group
# =============================================================================
- name: "PLAY 2 | System Hardening — SSH Config and Critical File Permissions"
  hosts: rocky
  become: true

  vars:
    sshd_config_path: /etc/ssh/sshd_config

  tasks:

    # ------------------------------------------------------------------
    # Element 3 — SSH hardening
    # Uses lineinfile to set or replace specific directives without
    # touching the rest of sshd_config (safer than a full template).
    # A handler restarts sshd only when a change actually occurs.
    # ------------------------------------------------------------------
    - name: "E3 | Ensure PermitRootLogin is set to no"
      lineinfile:
        path:   "{{ sshd_config_path }}"
        regexp: '^#?PermitRootLogin'
        line:   'PermitRootLogin no'
        state:  present
        backup: true   # keep a .bak in case of rollback
      notify: Restart sshd

    - name: "E3 | Ensure Protocol is set to 2"
      lineinfile:
        path:   "{{ sshd_config_path }}"
        regexp: '^#?Protocol'
        line:   'Protocol 2'
        state:  present
      notify: Restart sshd

    - name: "E3 | Disable empty passwords"
      lineinfile:
        path:   "{{ sshd_config_path }}"
        regexp: '^#?PermitEmptyPasswords'
        line:   'PermitEmptyPasswords no'
        state:  present
      notify: Restart sshd

    - name: "E3 | Validate sshd_config syntax before restarting"
      command: sshd -t
      changed_when: false
      # Conditional: if this fails, the handler won't fire and the
      # service won't restart with a broken config.

    # ------------------------------------------------------------------
    # Element 4 — Critical file permissions
    # /etc/passwd  should be 0644 (world-readable, root-writable)
    # /etc/shadow  should be 0000 or 0640 depending on distro convention;
    #              Rocky/RHEL standard is 0000 (root-only, via shadow group)
    # ------------------------------------------------------------------
    - name: "E4 | Set correct permissions on /etc/passwd"
      file:
        path:  /etc/passwd
        owner: root
        group: root
        mode:  '0644'

    - name: "E4 | Set correct permissions on /etc/shadow"
      file:
        path:  /etc/shadow
        owner: root
        group: root
        mode:  '0000'

    - name: "E4 | Verify permissions (stat both files)"
      stat:
        path: "{{ item }}"
      register: file_stats
      loop:
        - /etc/passwd
        - /etc/shadow
      changed_when: false

    - name: "E4 | Debug — show permissions for each file"
      debug:
        msg: "{{ item.stat.path }} — mode: {{ item.stat.mode }}"
      loop: "{{ file_stats.results }}"

  # ------------------------------------------------------------------------
  # Handlers — only triggered when a task issues a notify
  # ------------------------------------------------------------------------
  handlers:
    - name: Restart sshd
      service:
        name:  sshd
        state: restarted
      # Error handling: if sshd fails to start, Ansible will report the
      # error and stop the play — protecting you from a locked-out host.


# =============================================================================
# PLAY 3 — AD DS GPO Hardening (no GPMC)
# Element 5: Disable SMBv1 on domain-joined Windows hosts
# Element 6: Enforce screen saver timeout + password-protected lock
# Targets   : windows group (AD01, MGMT01, WKS01)
# Prerequisites : WinRM must be configured on Windows hosts.
#                 Inventory must set ansible_connection: winrm and
#                 supply ansible_user / ansible_password.
# =============================================================================
- name: "PLAY 3 | AD DS GPO Hardening — SMBv1 Disable and Screen Saver Lock"
  hosts: windows
  gather_facts: false   # winrm gather_facts is slow; skip unless needed

  vars:
    # Registry hive shortcuts used below
    screensaver_timeout_seconds: "600"   # 10 minutes

  tasks:

    # ------------------------------------------------------------------
    # Element 5 — Disable SMBv1
    # SMBv1 is a legacy protocol exploited by EternalBlue/WannaCry.
    # Two registry keys are required: one for the server component,
    # one for the client (LanmanWorkstation) component.
    # ------------------------------------------------------------------
    - name: "E5 | Disable SMBv1 — Server component"
      ansible.windows.win_regedit:
        path:  'HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters'
        name:  SMB1
        data:  0
        type:  dword
        state: present
      # Logical step: data=0 disables the feature; data=1 re-enables it.
      # No reboot required for the registry write itself, but SMBv1
      # won't be fully disabled until the next system restart.

    - name: "E5 | Disable SMBv1 — Client component (MrxSmb10 driver)"
      ansible.windows.win_regedit:
        path:  'HKLM:\SYSTEM\CurrentControlSet\Services\mrxsmb10'
        name:  Start
        data:  4          # 4 = Disabled in Windows service start types
        type:  dword
        state: present

    - name: "E5 | Confirm SMBv1 registry values"
      ansible.windows.win_reg_stat:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters'
        name: SMB1
      register: smb1_stat

    - name: "E5 | Debug — SMBv1 server key value"
      debug:
        msg: "SMB1 registry value is: {{ smb1_stat.value }} (expected 0)"

    # ------------------------------------------------------------------
    # Element 6 — Screen saver timeout and password-protected lock
    # These keys live under HKCU for per-user policy effect, but to
    # enforce domain-wide without GPMC we write to the Software\Policies
    # path under HKLM which applies machine-wide and cannot be overridden
    # by a logged-in user.
    # ------------------------------------------------------------------
    - name: "E6 | Enable screen saver via policy registry key"
      ansible.windows.win_regedit:
        path:  'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Control Panel\Desktop'
        name:  ScreenSaveActive
        data:  "1"
        type:  string
        state: present

    - name: "E6 | Set screen saver timeout to {{ screensaver_timeout_seconds }} seconds"
      ansible.windows.win_regedit:
        path:  'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Control Panel\Desktop'
        name:  ScreenSaveTimeOut
        data:  "{{ screensaver_timeout_seconds }}"
        type:  string
        state: present

    - name: "E6 | Require password on screen saver resume"
      ansible.windows.win_regedit:
        path:  'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Control Panel\Desktop'
        name:  ScreenSaverIsSecure
        data:  "1"
        type:  string
        state: present
      # Conditional note: these three keys must all be present and set
      # correctly for the lock to actually engage. Setting only one or
      # two of them produces partial or no effect.

    - name: "E6 | Verify screen saver policy key exists"
      ansible.windows.win_reg_stat:
        path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Control Panel\Desktop'
        name: ScreenSaverIsSecure
      register: ss_stat

    - name: "E6 | Debug — screen saver lock value"
      debug:
        msg: "ScreenSaverIsSecure = {{ ss_stat.value }} (expected 1)"
